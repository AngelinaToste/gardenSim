<html>
<head>
<meta name="viewport" content="width=device-width"/>
<style>
canvas {
    border:1px solid #d3d3d3;
    background-color: #80ebe8;
    width: 60%;
    height: 50%;
}
</style>
</head>
<body onload="startGame()">
<script>

var gamePiece;
var ground;
var growingPlants = [];
//var growCyclePhaseCount = 0;

function startGame() {
    gamePiece = new component(30, 60, "purple", 10, 150);
    ground = new obstacle(480, 70, "MediumSeaGreen", 0, 200);

    // Let k listen for keydown
    document.addEventListener("keydown", function (event) {
        if (event.key === 'W' || event.key === 'w' || event.key === 'ArrowUp') {
            console.log('up');
            moveup();
        }
        else if (event.key === 'S' || event.key === 's' || event.key === 'ArrowDown') {
            console.log('down');
            movedown();
        }
        else if (event.key === 'A' || event.key === 'a' || event.key === 'ArrowLeft') {
            console.log('left');
            moveleft();
        }
        else if (event.key === 'D' || event.key === 'd' || event.key === 'ArrowRight') {
            console.log('right');
            moveright();
        }
        else if (event.key === 'Q' || event.key === 'q') {
            plantFlower();
        }
    });

    myGameArea.start();
}

var myGameArea = {
    canvas : document.createElement("canvas"),
    start : function() {
        this.canvas.width = 480;
        this.canvas.height = 270;
        this.context = this.canvas.getContext("2d");
        document.body.insertBefore(this.canvas, document.body.childNodes[0]);
        this.interval = setInterval(updateGameArea, 20);
    },
    clear : function() {
        this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
    }
}

function component(width, height, color, x, y) {
    this.width = width;
    this.height = height;
    this.stepSize = 5
    this.x = x;
    this.y = y;    
    this.update = function() {
        ctx = myGameArea.context;
        ctx.fillStyle = color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
    this.newPos = function (directionChar) { // direction chars: u, d, l, r
        switch (directionChar){
            case 'u':
                this.y -= this.stepSize;
                break;
            case 'd':
                this.y += this.stepSize;
                break;
            case 'l':
                this.x -= this.stepSize;
                break;
            case 'r':
                this.x += this.stepSize;
                break;
        }
    }  
}

//FIXME: need to determine how to detect nearby plants so they dont overlap with each other
function plantNear (item) {
    growingPlants.forEach((p) => {
        if (collision(item, p)) {
            return p;
        }
    });
    return null;
}

function collision({ object1, object2 }) {
  return object1.x + object1.width >= object2.x
}

function obstacle(width, height, color, x, y) {
    this.width = width;
    this.height = height;
    this.stepSize = 5
    this.x = x;
    this.y = y;    
    this.update = function() {
        ctx = myGameArea.context;
        ctx.fillStyle = color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
}

function plant (src, width, height, alt, idChar) {
    this.image = new Image();
    this.image.src = src;
    this.width = width;
    this.height = height;
    this.alt = alt;
    this.x = 100;
    this.y = 100;
    this.growCyclePhaseCount = 0;
    this.maxGrowPhases = 4;

    this.update = function() {
        ctx = myGameArea.context;
        ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
    }
    this.setImage = function(newSrc) {
        this.image.src = newSrc;
    };
    this.newPos = function () {
        this.x = gamePiece.x + gamePiece.width;

    }
    this.grow = function () {
        this.setImage(this.alt + this.growCyclePhaseCount + ".png");
        if (this.growCyclePhaseCount < this.maxGrowPhases){
            this.growCyclePhaseCount++;
        } else {
            this.growCyclePhaseCount = 0;
        }
        this.newPos();
        growingPlants.push(this);
        updateGameArea();
    }
}

function updateGameArea() {
    myGameArea.clear();
    ground.update();

    growingPlants.forEach((p) => {
        p.update();
        
    });
    gamePiece.newPos();    
    gamePiece.update();
}

function moveup() {
    gamePiece.newPos('u'); 
}

function movedown() {
    gamePiece.newPos('d'); 
}

function moveleft() {
    gamePiece.newPos('l'); 
}

function moveright() {
    gamePiece.newPos('r'); 
}
function plantFlower() {
    var flower = new plant("", 100, 100, "sunflower", "f");
    flower.grow();
}

</script>
<div id="demo"></div>

<p >use WASD or arrow keys to move the square</p>
<p> use Q to plant a flower </p>
</body>
</html>
