}

var myGameArea = {
    canvas : document.createElement("canvas"),
    start : function() {
        this.context = this.canvas.getContext("2d");
        this.canvas.width = 480;
        this.canvas.height = 480;
        document.body.insertBefore(this.canvas, document.body.childNodes[0]);
        this.interval = setInterval(updateGameArea, 20);
    },
    clear : function() {
        this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
    }
}

function component(width, height, color, x, y) {
    this.width = width;
    this.height = height;
    this.stepSize = 5;
    this.x = x;
    this.y = y;    
    this.update = function() {
        ctx = myGameArea.context;
        ctx.fillStyle = color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
    this.newPos = function (directionChar) { // direction chars: u, d, l, r
        switch (directionChar){
            case 'u':
                if (this.y - this.stepSize > 0){
                    this.y -= this.stepSize;
                }
                break;
            case 'd':
                if (this.y + this.stepSize < myGameArea.canvas.height){
                    this.y += this.stepSize;
                }
                break;
            case 'l':
                if (this.x - this.stepSize > 0){
                    this.x -= this.stepSize;
                }
                break;
            case 'r':
                if (this.x + this.stepSize < myGameArea.canvas.width){
                    this.x += this.stepSize;
                }
                break;
        }
    }  
}

function plantNear (item) {
    growingPlants.forEach((p) => {
        if (collision(item, p)) {
            return p;
        }
    });
    return null;
}

function collision({ object1, object2 }) {
  return object1.x + object1.width >= object2.x
}


function obstacle(width, height, color, x, y) {
    this.width = width;
    this.height = height;
    this.stepSize = 5
    this.x = x;
    this.y = y;    
    this.update = function() {
        ctx = myGameArea.context;
        ctx.fillStyle = color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
}

function plant (src, width, height, alt, idChar) {
    this.image = new Image();
    this.image.src = src;
    this.width = width;
    this.height = height;
    this.alt = alt;
    this.x = 0;
    this.y = 0;
    this.growCyclePhaseCount = 0;
    this.maxGrowPhases = 4;

    this.update = function() {
        ctx = myGameArea.context;
        ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
    }
    this.setImage = function(newSrc) {
        this.image.src = newSrc;
    };
    this.newPos = function () {
        this.x = gamePiece.x + gamePiece.width;
        this.y = gamePiece.y + gamePiece.height;

    }
    this.grow = function () {
        this.setImage(this.alt + this.growCyclePhaseCount + ".png");
        if (this.growCyclePhaseCount < this.maxGrowPhases){
            this.growCyclePhaseCount++;
        } else {
            this.growCyclePhaseCount = 0;
        }
        this.newPos();
        growingPlants.push(this);
        updateGameArea();
    }
}

function updateGameArea() {
    myGameArea.clear();

    growingPlants.forEach((p) => {
        p.update();
        
    });

    //check if gamepiece collides with any walls
    
    gamePiece.newPos();    
    gamePiece.update();
}

function moveup() {
    gamePiece.newPos('u'); 
}

function movedown() {
    gamePiece.newPos('d'); 
}

function moveleft() {
    gamePiece.newPos('l'); 
}

function moveright() {
    gamePiece.newPos('r'); 
}
function plantFlower() {
    var flower = new plant("", 40, 40, "sunflower", "f");
    flower.grow();
}
