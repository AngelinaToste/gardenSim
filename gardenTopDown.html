<html>
<head>
<meta name="viewport" content="width=device-width"/>
<style>

canvas {
    border:1px solid #d3d3d3;
    background-color: #4d975f;
    width: 99%;
    height: 80%;
}

body {
    align-self: center;
    justify-content: center;
    align-content: center;
    
}
div {
    align-self: center;
    align-content: center;
}
</style>
</head>
<div>
<body onload="startGame()"></body>
</div>
<script>

//TODO: clean up redundancies and replace with more efficient functions for newPos especially

var gamePiece;
var shadow;
var growingPlants = [];
var gameGrid = []; // 2d array containing entries such as [(x, y), plant] or [(x, y), 0]
var scale = 100;
var canvasSize = [1000, 500];
var shadowVisible = true;

function startGame() {
    gamePiece = new component("girlD.png", "girl", scale, scale, "black", 0, 0, false);
    shadow = new component("", "", scale, scale, "black", 0, 0, true);

    // Let k listen for keydown
    document.addEventListener("keydown", function (event) {
        if (event.key === 'W' || event.key === 'w' || event.key === 'ArrowUp') {
            console.log('up');
            moveup();
        }
        else if (event.key === 'S' || event.key === 's' || event.key === 'ArrowDown') {
            console.log('down');
            movedown();
        }
        else if (event.key === 'A' || event.key === 'a' || event.key === 'ArrowLeft') {
            console.log('left');
            moveleft();
        }
        else if (event.key === 'D' || event.key === 'd' || event.key === 'ArrowRight') {
            console.log('right');
            moveright();
        }
        else if (event.key === 'Q' || event.key === 'q') {
            plantFlower();
        }
        else if (event.key === 'E' || event.key === 'e') {
            waterFlower();
        }
        else if (event.key === 'R' || event.key === 'r') {
            digFlower();
        }
    });

    myGameArea.start();
    gameGrid = generateSquareGrid(scale);
    
}

function generateSquareGrid(cellSideLength) {
    var grid = [];
    if (((myGameArea.canvas.width % cellSideLength) != 0) && ((myGameArea.canvas.height % cellSideLength) != 0)){
        console.log("Error: Could not generate a square grid.");
        return [];  // square grid cannot fit evenly in the given area
    }

    // only store top left corner points
    // use side lengths to determine full area when points are accessed later.
    for (var i = 0; i < myGameArea.canvas.width; i += cellSideLength){
        var point;
        var xval, yval;
        xval = i;
        for (var j = 0; j < myGameArea.canvas.height; j += cellSideLength) {
            yval = j;
            point = [xval, yval];
            grid.push([point, 0]); //using 0 as a placeholder to mean no items are attached to this point.
        }
    }
    return grid;
}

var myGameArea = {
    canvas : document.createElement("canvas"),
    start : function() {
        this.context = this.canvas.getContext("2d");
        this.canvas.width = canvasSize[0];
        this.canvas.height = canvasSize[1];
        document.body.insertBefore(this.canvas, document.body.childNodes[0]);
        this.interval = setInterval(updateGameArea, 20);
    },
    clear : function() {
        this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
    }
}

function component(src, alt, width, height, color, x, y, isOutlined) {
    this.image = new Image();
    this.image.src = src;
    this.alt = alt;
    this.width = width;
    this.height = height;
    this.stepSize = scale;
    this.x = x;
    this.y = y;
    this.isOutlined = isOutlined;
    this.lastDirectionChar = "";

    this.update = function() {
        ctx = myGameArea.context;
        if (this.isOutlined) { 
            ctx.strokeRect(this.x, this.y, this.width, this.height);
        }  
        ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
    }
    this.setImage = function(newSrc) {
        this.image.src = newSrc;
    };
    this.newPos = function (directionChar) { // direction chars: u, d, l, r
        switch (directionChar){
            case 'u':
                if (this.y - this.stepSize >= 0){
                    this.y -= this.stepSize;
                }
                this.lastDirectionChar = directionChar;
                this.setImage(this.alt + directionChar.toUpperCase() + ".png");
                var shadowPoint = this.getShadowPoint();
                if (shadowPoint.length != 0){
                    shadowVisible = true;
                    shadow.x = shadowPoint[0];
                    shadow.y = shadowPoint[1];
                } else {
                    shadowVisible = false;
                }
                break;
            case 'd':
                if (this.y + this.stepSize < myGameArea.canvas.height){
                    this.y += this.stepSize;
                }
                this.lastDirectionChar = directionChar;
                this.setImage(this.alt + directionChar.toUpperCase() + ".png");
                var shadowPoint = this.getShadowPoint();
                if (shadowPoint.length != 0){
                    shadowVisible = true;
                    shadow.x = shadowPoint[0];
                    shadow.y = shadowPoint[1];
                } else {
                    shadowVisible = false;
                }
                break;
            case 'l':
                if (this.x - this.stepSize >= 0){
                    this.x -= this.stepSize;
                }
                this.lastDirectionChar = directionChar;
                this.setImage(this.alt + directionChar.toUpperCase() + ".png");
                var shadowPoint = this.getShadowPoint();
                if (shadowPoint.length != 0){
                    shadowVisible = true;
                    shadow.x = shadowPoint[0];
                    shadow.y = shadowPoint[1];
                } else {
                    shadowVisible = false;
                }
                break;
            case 'r':
                if (this.x + this.stepSize < myGameArea.canvas.width){
                    this.x += this.stepSize;
                }
                this.lastDirectionChar = directionChar;
                this.setImage(this.alt + directionChar.toUpperCase() + ".png");
                var shadowPoint = this.getShadowPoint();
                if (shadowPoint.length != 0){
                    shadowVisible = true;
                    shadow.x = shadowPoint[0];
                    shadow.y = shadowPoint[1];
                } else {
                    shadowVisible = false;
                }
                break;
        }
    }
    this.getShadowPoint = function () {
       switch (this.lastDirectionChar){
            case 'u': // place it above the character
                if (this.y - this.height >= 0){
                    return [this.x, this.y - this.height];
                } 
                else { return []; }
                break;
            case 'd': // place it below the character
                if (this.y + this.height < myGameArea.canvas.height){
                    return [this.x, this.y + this.height];
                }
                else { return []; }
                break;
            case 'l':
                if (gamePiece.x - this.width >= 0){
                    return [this.x - this.width, gamePiece.y];
                }
                else { return []; }
                break;
            case 'r':
                if (gamePiece.x + this.width < myGameArea.canvas.width){
                    return [this.x + this.width, gamePiece.y];
                }
                else { return []; }
                break;
        }
    } 

    this.hide =  function () {

    }
}

function cellAvailable (x, y) {
    var cellIndex = gameGrid.findIndex(cell => cell[0][0] === x && cell[0][1] === y);
    if ( cellIndex != -1 && gameGrid[cellIndex][1] == 0) { return cellIndex; }
    return -1;
}

function cellWithPlant (x, y) {
    var cellIndex = gameGrid.findIndex(cell => cell[0][0] === x && cell[0][1] === y);
    if ( cellIndex != -1 && gameGrid[cellIndex][1] != 0) { return cellIndex; }
    return -1;
}

function collision({ object1, object2 }) {
  return object1.x + object1.width >= object2.x
}


function obstacle(width, height, color, x, y) {
    this.width = width;
    this.height = height;
    this.stepSize = 5;
    this.x = x;
    this.y = y;    
    this.update = function() {
        ctx = myGameArea.context;
        ctx.fillStyle = color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
}

function plant (src, width, height, alt, idChar) {
    this.image = new Image();
    this.image.src = src;
    this.width = width;
    this.height = height;
    this.alt = alt;
    this.x = 0;
    this.y = 0;
    this.growCyclePhaseCount = 0;
    this.maxGrowPhases = 4;

    this.update = function() {
        ctx = myGameArea.context;
        ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
    }
    this.setImage = function(newSrc) {
        this.image.src = newSrc;
    };
    this.newPos = function () {
        var shadowPoint = gamePiece.getShadowPoint(); 
        if (shadowVisible && shadowPoint.length != 0){
            this.x = shadowPoint[0];
            this.y = shadowPoint[1];
            return true;
        } else {return false;}
    }
    this.placeSeed = function () {
        var newPosPossible = this.newPos();
        var cellIndex = cellAvailable(this.x, this.y);
        if ( newPosPossible && cellIndex != -1) { // check that the spot for the plant is available
            gameGrid[cellIndex][1] = this;
            this.grow();
        } else {
            alert("You can't plant something here.");
        }
    }
    this.grow = function () {
        this.setImage(this.alt + this.growCyclePhaseCount + ".png");
        if (this.growCyclePhaseCount < this.maxGrowPhases){
            this.growCyclePhaseCount++;
        } else {
            this.growCyclePhaseCount = 0;
        }
        updateGameArea();
    }
}

function updateGameArea() {
    myGameArea.clear();
    gameGrid.forEach((p) => {
        if (p[1] != 0) { p[1].update();}
    });
    gamePiece.newPos();    
    gamePiece.update();
    if (shadowVisible) { shadow.update(); }
    
}

function moveup() {
    gamePiece.newPos('u'); 
}

function movedown() {
    gamePiece.newPos('d'); 
}

function moveleft() {
    gamePiece.newPos('l'); 
}

function moveright() {
    gamePiece.newPos('r'); 
}
function plantFlower() {
    var flower = new plant("", scale, scale, "sunflower", "f");
    flower.placeSeed();
}
function waterFlower() {
    //detect if a flower is in the player's "shadow" then
    var shadowPoint = gamePiece.getShadowPoint(); 
    var plantIndex = cellWithPlant(shadowPoint[0], shadowPoint[1]);
    if (plantIndex != -1){
        gameGrid[plantIndex][1].grow();
    }
}
function digFlower() {
    //detect if a flower is in the player's "shadow" then
    var shadowPoint = gamePiece.getShadowPoint(); 
    var plantIndex = cellWithPlant(shadowPoint[0], shadowPoint[1]);
    if (plantIndex != -1){
        gameGrid[plantIndex][1] = 0;
        updateGameArea();
    }
}

</script>
<div id="demo"></div>
<h4>Garden Sim Controls</h4>
<ul>
    <li>use WASD or arrow keys to move the square</li>
    <li>use Q to plant a seed</li>
    <li>use E to water an already planted seed</li>
    <li>use R to dig up/ remove a plant</li>
</ul>
</body>
</html>
